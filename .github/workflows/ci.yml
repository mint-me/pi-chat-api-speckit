name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pi_chat
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pi_chat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pi_chat
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'ci-local-jwt-secret-minimum-32-chars' }}
      OPENROUTER_API_KEY: ""
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --frozen --dev
      - name: Run migrations
        run: uv run alembic upgrade head
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Pytest
        run: uv run pytest --cov=app --cov-fail-under=80

  compose-smoke:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --frozen --dev
      - name: Prepare env file
        run: cp .env.example .env
      - name: Start stack
        run: docker compose up -d --build
      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs api
          exit 1
      - name: Smoke test
        env:
          OPENROUTER_API_KEY: ""
        run: uv run python scripts/smoke.py http://localhost:8000
      - name: Logs on failure
        if: failure()
        run: docker compose logs api
