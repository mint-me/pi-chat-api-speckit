name: ${COMPOSE_PROJECT_NAME:?COMPOSE_PROJECT_NAME is required}

x-app-env: &app-env
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

services:
  db:
    image: ${POSTGRES_IMAGE:?POSTGRES_IMAGE is required}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
  api:
    build:
      context: .
      target: runtime
    init: true
    env_file:
      - .env
    environment: *app-env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    command:
      [
        "sh",
        "-c",
        "uv run --no-sync alembic upgrade head && uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  test:
    build:
      context: .
      target: test
    init: true
    env_file:
      - .env
    environment: *app-env
    profiles:
      - test
    command: ["uv", "run", "--no-sync", "pytest", "-q"]

  seed:
    build:
      context: .
      target: runtime
    init: true
    env_file:
      - .env
    environment: *app-env
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - demo
    command: ["uv", "run", "--no-sync", "python", "scripts/seed.py"]
    restart: "no"

volumes:
  postgres-data:
