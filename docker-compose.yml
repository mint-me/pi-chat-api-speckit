services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pi_chat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pi_chat"]
      interval: 5s
      timeout: 5s
      retries: 12
  api:
    build:
      context: .
      target: runtime
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/pi_chat
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    command:
      [
        "sh",
        "-c",
        "uv run --no-sync alembic upgrade head && uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  test:
    build:
      context: .
      target: test
    env_file:
      - .env
    profiles:
      - test
    command: ["uv", "run", "--no-sync", "pytest", "-q"]

  seed:
    build:
      context: .
      target: runtime
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/pi_chat
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - demo
    command: ["uv", "run", "--no-sync", "python", "scripts/seed.py"]
    restart: "no"
